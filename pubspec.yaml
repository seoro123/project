name: ai_diary_social_platform
description: Flutter Web AI diary and social platform.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # App foundation
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  intl: ^0.20.2
  collection: ^1.19.1

  # Supabase
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^5.2.1

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  uuid: ^4.5.2

  # Network, logging, and error handling
  http: ^1.5.0
  dio: ^5.9.2
  logger: ^2.6.1
  riverpod_annotation: ^4.0.2
  url_launcher: ^6.3.2

  # UI and interaction
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  gap: ^3.0.1
  shimmer: ^3.0.0
  lottie: ^3.3.3
  flutter_svg: ^2.2.2
  file_picker: ^10.3.7
  shared_preferences: ^2.5.3

  # Forms
  form_validator: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.6.0
  freezed: ^3.2.5
  json_serializable: ^6.11.1
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
